<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Create Account</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container register-wrapper">

    <div class="row">

        <div class="col s12 m8 l6 offset-m2 offset-l3">

            <div class="card register-card z-depth-3">

                <div class="center">

                    <i class="material-icons large amber-text logo-icon">
                        auto_awesome
                    </i>

                    <h4 class="deep-purple-text">
                        Create Account
                    </h4>

                    <p class="grey-text">
                        Begin your mystical journey today
                    </p>

                </div>

                <form id="registerForm">

                    <div class="input-field">

                        <i class="material-icons prefix">
                            person
                        </i>

                        <input
                            id="name"
                            type="text"
                            required>

                        <label for="name">
                            Full Name
                        </label>

                    </div>

                    <div class="input-field">

                        <i class="material-icons prefix">
                            account_circle
                        </i>

                        <input
                            id="username"
                            type="text"
                            required>

                        <label for="username">
                            Username
                        </label>

                    </div>

                    <div class="input-field">

                        <i class="material-icons prefix">
                            lock
                        </i>

                        <input
                            id="password"
                            type="password"
                            required>

                        <label for="password">
                            Password
                        </label>

                    </div>

                    <div class="input-field">

                        <i class="material-icons prefix">
                            email
                        </i>

                        <input
                            id="email"
                            type="email"
                            required>

                        <label for="email">
                            Email
                        </label>

                    </div>

                    <div class="input-field">

                        <i class="material-icons prefix">
                            phone
                        </i>

                        <input
                            id="phone"
                            type="text"
                            required>

                        <label for="phone">
                            Phone Number
                        </label>

                    </div>

                    <br>

                    <button
                        id="registerBtn"
                        type="submit"
                        class="btn-large deep-purple submit-btn">

                        <span id="btnText">
                            CREATE ACCOUNT
                        </span>

                        <div
                            id="btnLoader"
                            class="preloader-wrapper small active"
                            style="display:none;">

                            <div class="spinner-layer spinner-white-only">

                                <div class="circle-clipper left">
                                    <div class="circle"></div>
                                </div>

                                <div class="gap-patch">
                                    <div class="circle"></div>
                                </div>

                                <div class="circle-clipper right">
                                    <div class="circle"></div>
                                </div>

                            </div>

                        </div>

                    </button>

                </form>

                <br>

                <div class="center">

                    Already have an account?

                    <a href="login.html">
                        Login
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

<script src="js/register.js"></script>

<!-- LOADING OVERLAY -->

<div id="loadingOverlay" class="loading-overlay">

    <div class="loading-content">

        <div class="preloader-wrapper big active">

            <div class="spinner-layer spinner-blue-only">

                <div class="circle-clipper left">
                    <div class="circle"></div>
                </div>

                <div class="gap-patch">
                    <div class="circle"></div>
                </div>

                <div class="circle-clipper right">
                    <div class="circle"></div>
                </div>

            </div>

        </div>

        <h5>Creating Account...</h5>

        <p>Please wait</p>

    </div>

</div>
</body>
</html>
